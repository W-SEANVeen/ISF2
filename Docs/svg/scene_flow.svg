<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 620" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#CC0000"/>
    </marker>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F5F5F5"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="500" height="620" fill="white"/>

  <!-- Box 1: BootScene -->
  <rect x="100" y="10" width="300" height="70" rx="8" fill="url(#boxGrad)" stroke="#333" stroke-width="2"/>
  <text x="250" y="42" text-anchor="middle" font-size="16" font-weight="bold" fill="#CC0000">BootScene</text>
  <text x="250" y="62" text-anchor="middle" font-size="12" fill="#666">根场景 — 启动加载</text>
  <!-- Action label -->
  <text x="250" y="95" text-anchor="middle" font-size="11" fill="#999">BootLoader 自动跳转</text>
  <line x1="250" y1="80" x2="250" y2="108" stroke="#CC0000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 2: GameStartMenu -->
  <rect x="100" y="115" width="300" height="70" rx="8" fill="url(#boxGrad)" stroke="#333" stroke-width="2"/>
  <text x="250" y="147" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">GameStartMenu</text>
  <text x="250" y="167" text-anchor="middle" font-size="12" fill="#666">开始菜单场景</text>
  <text x="250" y="200" text-anchor="middle" font-size="11" fill="#999">点击"开始游戏"</text>
  <line x1="250" y1="185" x2="250" y2="213" stroke="#CC0000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 3: Scene2_city_v2 -->
  <rect x="65" y="220" width="370" height="85" rx="8" fill="url(#boxGrad)" stroke="#CC0000" stroke-width="2.5"/>
  <text x="250" y="252" text-anchor="middle" font-size="16" font-weight="bold" fill="#CC0000">Scene2_city_v2</text>
  <text x="250" y="272" text-anchor="middle" font-size="12" fill="#666">战斗场景 — 所有核心玩法集中于此</text>
  <text x="250" y="290" text-anchor="middle" font-size="11" fill="#999">⚠ 核心主战场</text>
  <text x="250" y="320" text-anchor="middle" font-size="11" fill="#999">战斗结束 → 跳转</text>
  <line x1="250" y1="305" x2="250" y2="333" stroke="#CC0000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 4: GameEnd -->
  <rect x="100" y="340" width="300" height="70" rx="8" fill="url(#boxGrad)" stroke="#333" stroke-width="2"/>
  <text x="250" y="372" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">GameEnd</text>
  <text x="250" y="392" text-anchor="middle" font-size="12" fill="#666">结束场景 — 结算</text>
  <text x="250" y="425" text-anchor="middle" font-size="11" fill="#999">点击返回主菜单（循环）</text>
  <line x1="250" y1="410" x2="250" y2="438" stroke="#CC0000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 5: GameStartMenu (loop) -->
  <rect x="100" y="445" width="300" height="55" rx="8" fill="url(#boxGrad)" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="250" y="472" text-anchor="middle" font-size="14" fill="#999">GameStartMenu（循环）</text>
  <text x="250" y="490" text-anchor="middle" font-size="11" fill="#bbb">重新开始</text>
</svg>
